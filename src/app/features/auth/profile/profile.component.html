<div class="profile-wrapper">
  <div class="profile-card" *ngIf="user; else noUser">

    <div class="avatar-row">
      <div class="avatar">{{ user?.fullName?.charAt(0)?.toUpperCase() }}</div>
      <div class="name-block">
        <h1>{{ user?.fullName }}</h1>
        <span class="role-badge">{{ user?.role || 'User' }}</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="info-grid">
      <div class="info-item">
        <span class="info-label">📧 Email</span>
        <span class="info-value">{{ user?.email }}</span>
      </div>
      <div class="info-item">
        <span class="info-label">🎭 Role</span>
        <span class="info-value">{{ user?.role || '—' }}</span>
      </div>
      <div class="info-item">
        <span class="info-label">🕐 Last login</span>
        <span class="info-value">{{ formatDate(user?.lastLogin) }}</span>
      </div>
    </div>

    <div class="divider"></div>

    <button class="btn-logout" (click)="logout()">
      🚪 Logout
    </button>
  </div>

  <ng-template #noUser>
    <div class="profile-card center">
      <p>No user data found. <a routerLink="/auth/login">Login again</a></p>
    </div>
  </ng-template>
</div>
