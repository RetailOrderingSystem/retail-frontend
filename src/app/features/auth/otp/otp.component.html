<div class="auth-wrapper">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-icon">🔐</div>
      <h1>Verify your email</h1>
      <p>We sent a 6-digit code to <strong>{{ email }}</strong></p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="field">
        <label for="otp">One-time password</label>
        <input
          id="otp"
          type="text"
          formControlName="otp"
          placeholder="Enter 6-digit OTP"
          maxlength="6"
          inputmode="numeric"
          autocomplete="one-time-code"
          [class.input-error]="otp.invalid && otp.touched"
        />
        <span class="error-msg" *ngIf="otp.invalid && otp.touched">
          <ng-container *ngIf="otp.errors?.['required']">OTP is required.</ng-container>
          <ng-container *ngIf="otp.errors?.['pattern']">OTP must be exactly 6 digits.</ng-container>
        </span>
      </div>

      <div class="server-error" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn-primary" [disabled]="form.invalid || loading">
        <span *ngIf="!loading">Verify OTP →</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <div class="resend-row">
      <ng-container *ngIf="!canResend">
        Resend OTP in <strong>{{ timerSeconds }}s</strong>
      </ng-container>
      <ng-container *ngIf="canResend">
        <button class="btn-resend" (click)="resendOtp()" [disabled]="resending">
          {{ resending ? 'Sending…' : 'Resend OTP' }}
        </button>
      </ng-container>
    </div>

    <div class="footer-link">
      <a routerLink="/auth/login">← Back to login</a>
    </div>
  </div>
</div>
